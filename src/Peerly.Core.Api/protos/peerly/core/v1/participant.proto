syntax = "proto3";

package peerly.core.v1;

import "peerly/core/v1/common.proto";

option csharp_namespace = "Peerly.Core.V1.Proto";

service ParticipantService {
  rpc V1AddGroupStudent(V1AddGroupStudentRequest) returns (V1AddGroupStudentResponse);
  rpc V1AddGroupTeacher(V1AddGroupTeacherRequest) returns (V1AddGroupTeacherResponse);
  rpc V1ListCourseParticipants(V1ListCourseParticipantsRequest) returns (V1ListCourseParticipantsResponse);
  rpc V1ListGroupParticipants(V1ListGroupParticipantsRequest) returns (V1ListGroupParticipantsResponse);
}

message V1AddGroupStudentRequest {
  int64 group_id = 1;
  int64 student_id = 2;
  int64 teacher_id = 3;
}

message V1AddGroupStudentResponse {
  oneof response {
    Success success_response = 1;
    ValidationError validation_error = 2;
    OtherError other_error = 3;
  }

  message Success {}
}

message V1AddGroupTeacherRequest {
  int64 group_id = 1;
  int64 teacher_id = 2;
  int64 actor_teacher_id = 3;
}

message V1AddGroupTeacherResponse {
  oneof response {
    Success success_response = 1;
    ValidationError validation_error = 2;
    OtherError other_error = 3;
  }

  message Success {}
}


message V1ListCourseParticipantsRequest {
  int64 course_id = 1;
}

message V1ListCourseParticipantsResponse {
  repeated TeacherInfo teachers = 1;
  repeated StudentInfo students = 2;
}

message V1ListGroupParticipantsRequest {
  int64 group_id = 1;
}

message V1ListGroupParticipantsResponse {
  repeated TeacherInfo teachers = 1;
  repeated StudentInfo students = 2;
}
