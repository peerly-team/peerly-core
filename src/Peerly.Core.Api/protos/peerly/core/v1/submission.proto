syntax = "proto3";

package peerly.core.v1;

import "peerly/core/v1/common.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Peerly.Core.V1.Proto";

// todo: добавить сортировку в Search ручки
service SubmissionService {
  rpc V1CreateHomeworkSubmission(V1CreateHomeworkSubmissionRequest) returns (V1CreateHomeworkSubmissionResponse);

  // todo: реализовать
  //rpc V1UpdateHomeworkSubmission(V1UpdateHomeworkSubmissionRequest) returns (V1UpdateHomeworkSubmissionResponse);
  //rpc V1CreateHomeworkSubmissionAttachment(V1CreateHomeworkSubmissionAttachmentRequest) returns (V1CreateHomeworkSubmissionAttachmentResponse);
}

message V1CreateHomeworkSubmissionRequest {
  int64 homework_id = 1;
  int64 student_id = 2;
  string comment = 3;
}

message V1CreateHomeworkSubmissionResponse {
  oneof response {
    Success success_response = 1;
    ValidationError validation_error = 2;
    OtherError other_error = 3;
  }

  message Success {
    int64 homework_submission_id = 1;
  }
}
