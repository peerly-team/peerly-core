syntax = "proto3";

package peerly.core.v1;

import "peerly/core/v1/common.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Peerly.Core.V1.Proto";

service HomeworkService {
  rpc V1CreateCourseHomework(V1CreateCourseHomeworkRequest) returns (V1CreateCourseHomeworkResponse);
  rpc V1CreateGroupHomework(V1CreateGroupHomeworkRequest) returns (V1CreateGroupHomeworkResponse);
  rpc V1CreateHomeworkFile(V1CreateHomeworkFileRequest) returns (V1CreateHomeworkFileResponse);
  rpc V1UpdateDraftHomework(V1UpdateDraftHomeworkRequest) returns (V1UpdateDraftHomeworkResponse);
  rpc V1PostponeHomeworkDeadlines(V1PostponeHomeworkDeadlinesRequest) returns (V1PostponeHomeworkDeadlinesResponse);
  rpc V1PublishHomework(V1PublishHomeworkRequest) returns (V1PublishHomeworkResponse);
  rpc V1ConfirmHomework(V1ConfirmHomeworkRequest) returns (V1ConfirmHomeworkResponse);
  rpc V1ListTeacherCourseHomeworks(V1ListTeacherCourseHomeworksRequest) returns (V1ListTeacherCourseHomeworksResponse);
  rpc V1ListStudentCourseHomeworks(V1ListTeacherCourseHomeworksRequest) returns (V1ListTeacherCourseHomeworksResponse);
  rpc V1SearchTeacherHomeworks(V1SearchTeacherHomeworksRequest) returns (V1SearchTeacherHomeworksResponse);
  rpc V1SearchStudentHomeworks(V1SearchTeacherHomeworksRequest) returns (V1SearchTeacherHomeworksResponse);
}

message V1CreateCourseHomeworkRequest {
  int64 course_id = 1;
  int64 teacher_id = 2;
  string name = 3;
  int32 amount_of_reviewers = 4;
  google.protobuf.StringValue description = 5;
  string checklist = 6;
  google.protobuf.Timestamp deadline = 7;
  google.protobuf.Timestamp review_deadline = 8;
  int32 discrepancy_threshold = 9;
}

message V1CreateCourseHomeworkResponse {
  oneof response {
    Success success_response = 1;
    ValidationError validation_error = 2;
    OtherError other_error = 3;
  }

  message Success {
    int64 homework_id = 1;
  }
}

message V1CreateGroupHomeworkRequest {
  int64 group_id = 1;
  int64 teacher_id = 2;
  string name = 3;
  int32 amount_of_reviewers = 4;
  google.protobuf.StringValue description = 5;
  string checklist = 6;
  google.protobuf.Timestamp deadline = 7;
  google.protobuf.Timestamp review_deadline = 8;
  int32 discrepancy_threshold = 9;
}

message V1CreateGroupHomeworkResponse {
  oneof response {
    Success success_response = 1;
    ValidationError validation_error = 2;
    OtherError other_error = 3;
  }

  message Success {
    int64 homework_id = 1;
  }
}

message V1CreateHomeworkFileRequest {
  int64 homework_id = 1;
  string storage_id = 2;
  string file_name = 3;
  int32 file_size = 4;
  int64 teacher_id = 5;
}

message V1CreateHomeworkFileResponse {
  oneof response {
    Success success_response = 1;
    ValidationError validation_error = 2;
    OtherError other_error = 3;
  }

  message Success {
    int64 file_id = 1;
  }
}

message V1PublishHomeworkRequest {
  int64 homework_id = 1;
  int64 teacher_id = 2;
}

message V1PublishHomeworkResponse {
  oneof response {
    Success success_response = 1;
    ValidationError validation_error = 2;
    OtherError other_error = 3;
  }

  message Success {}
}

message V1ConfirmHomeworkRequest {
  int64 homework_id = 1;
  int64 teacher_id = 2;
  repeated MarkCorrection mark_corrections = 3;

  message MarkCorrection {
    int64 submitted_homework_id = 1;
    int32 teacher_mark = 2;
  }
}

message V1ConfirmHomeworkResponse {
  oneof response {
    Success success_response = 1;
    ValidationError validation_error = 2;
    OtherError other_error = 3;
  }

  message Success {}
}

message V1UpdateDraftHomeworkRequest {
  int64 homework_id = 1;
  int64 teacher_id = 2;
  string name = 3;
  int32 amount_of_reviewers = 4;
  google.protobuf.StringValue description = 5;
  string checklist = 6;
  google.protobuf.Timestamp deadline = 7;
  google.protobuf.Timestamp review_deadline = 8;
  int32 discrepancy_threshold = 9;
}

message V1UpdateDraftHomeworkResponse {
  oneof response {
    Success success_response = 1;
    ValidationError validation_error = 2;
    OtherError other_error = 3;
  }

  message Success {}
}

message V1PostponeHomeworkDeadlinesRequest {
  int64 homework_id = 1;
  int64 teacher_id = 2;
  google.protobuf.Timestamp deadline = 3;
  google.protobuf.Timestamp review_deadline = 4;
}

message V1PostponeHomeworkDeadlinesResponse {
  oneof response {
    Success success_response = 1;
    ValidationError validation_error = 2;
    OtherError other_error = 3;
  }

  message Success {}
}

message V1ListStudentCourseHomeworksRequest {
  int64 student_id = 1;
  int64 course_id = 2;
  SearchCourseHomeworksFilter filter = 3;
  PaginationInfo pagination_info = 4;
}

message V1ListStudentCourseHomeworksResponse {
  repeated HomeworkInfo homework_infos = 1;
}

message V1ListTeacherCourseHomeworksRequest {
  int64 teacher_id = 1;
  int64 course_id = 2;
  SearchCourseHomeworksFilter filter = 3;
  PaginationInfo pagination_info = 4;
}

message V1ListTeacherCourseHomeworksResponse {
  repeated HomeworkInfo homework_infos = 1;
}
